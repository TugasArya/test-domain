<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Domain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f9; /* Soft, clean background color */
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px; /* Smooths the corners of your image */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12); /* Adds a subtle shadow drop */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Replace the URL below with your actual image file or link -->
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Featured Image">
    </div>

</body>
</html>
